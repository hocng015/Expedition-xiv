name: Build

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'repo.json'
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Find build output
        id: find_output
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Path Expedition/bin -Filter "Expedition.dll" -Recurse | Select-Object -First 1
          if (-not $dll) {
            Write-Error "Could not find Expedition.dll"
            exit 1
          }
          Write-Host "Found output at: $($dll.DirectoryName)"
          "output_dir=$($dll.DirectoryName)" >> $env:GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Expedition
          path: ${{ steps.find_output.outputs.output_dir }}/
          if-no-files-found: error
          retention-days: 14
