name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set version in csproj
        shell: pwsh
        run: |
          $csproj = Get-Content Expedition/Expedition.csproj -Raw
          $csproj = $csproj -replace '<Version>.*?</Version>', "<Version>${{ steps.version.outputs.version }}</Version>"
          Set-Content Expedition/Expedition.csproj $csproj

      - name: Set version in manifest
        shell: pwsh
        run: |
          $manifest = Get-Content Expedition/Expedition.json -Raw | ConvertFrom-Json
          $manifest.AssemblyVersion = "${{ steps.version.outputs.version }}"
          $manifest | ConvertTo-Json -Depth 10 | Set-Content Expedition/Expedition.json

      - name: Download Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Release
        run: dotnet build --configuration Release --no-restore

      - name: Install Obfuscar
        shell: pwsh
        run: |
          dotnet tool install --global Obfuscar.GlobalTool
          $toolsPath = Join-Path $env:USERPROFILE '.dotnet\tools'
          Write-Host "Tools path: $toolsPath"
          Get-ChildItem $toolsPath | ForEach-Object { Write-Host "  $_" }
          "$toolsPath" >> $env:GITHUB_PATH

      - name: Obfuscate Release build
        shell: pwsh
        run: |
          # Find the actual output directory (TFM varies)
          $dll = Get-ChildItem -Path Expedition/bin/x64/Release -Filter "Expedition.dll" -Recurse | Select-Object -First 1
          if (-not $dll) {
            Write-Error "Could not find Expedition.dll"
            exit 1
          }
          $outputDir = $dll.DirectoryName
          Write-Host "Output directory: $outputDir"

          # Update obfuscar.xml paths to match actual build output
          $relativePath = [System.IO.Path]::GetRelativePath((Get-Location), $outputDir)
          $xml = Get-Content obfuscar.xml -Raw
          $xml = $xml -replace 'Expedition\\bin\\x64\\Release\\net10\.0-windows7\.0', $relativePath
          Set-Content obfuscar.xml $xml
          Write-Host "Updated obfuscar.xml with path: $relativePath"

          # Run obfuscation
          obfuscar obfuscar.xml

          # Replace original DLL with obfuscated version
          Copy-Item "$outputDir\obfuscated\Expedition.dll" "$outputDir\Expedition.dll" -Force
          Remove-Item "$outputDir\obfuscated" -Recurse -Force

      - name: Find or create latest.zip
        id: find_zip
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path Expedition/bin -Filter "latest.zip" -Recurse | Select-Object -First 1
          if ($zip) {
            Write-Host "Found latest.zip at: $($zip.FullName)"
            "zip_path=$($zip.FullName)" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "latest.zip not found, creating manually..."
            $dll = Get-ChildItem -Path Expedition/bin/x64/Release -Filter "Expedition.dll" -Recurse | Select-Object -First 1
            if (-not $dll) {
              Write-Error "Could not find Expedition.dll"
              exit 1
            }
            $outputDir = $dll.DirectoryName
            $files = Get-ChildItem $outputDir -File | Where-Object { $_.Extension -in '.dll', '.json' }
            $zipPath = Join-Path $outputDir "latest.zip"
            Compress-Archive -Path $files.FullName -DestinationPath $zipPath -Force
            Write-Host "Created latest.zip at: $zipPath"
            "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Expedition v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ steps.find_zip.outputs.zip_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update repo.json
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $repo = Get-Content repo.json -Raw | ConvertFrom-Json

          foreach ($plugin in $repo) {
            if ($plugin.InternalName -eq "Expedition") {
              $plugin.AssemblyVersion = $ver
            }
          }

          $repo | ConvertTo-Json -Depth 10 | Set-Content repo.json

      - name: Commit repo.json update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add repo.json
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: update repo.json for v${{ steps.version.outputs.version }}"
          git push origin main
